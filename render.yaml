services:
  - type: web
    name: male-store-admin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: CODE_PEPPER
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin@male.com.br
      - key: DB_PATH
        value: /opt/render/project/src/giftcards.db

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Monograma Tonton — "tt" duplo, espírito infantil,
  para uso em ícones, miniaturas e apresentações.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="tonton">
  <rect width="200" height="200" rx="36" fill="#FFF6E6"/>
  <ellipse cx="105" cy="108" rx="72" ry="64" fill="#F38A35" opacity="0.16"/>

  <!-- "t" amarelo atrás -->
  <text x="65" y="146"
        font-family="'Fredoka', 'Quicksand', 'Comic Sans MS', sans-serif"
        font-weight="700" font-size="130" fill="#FCC630"
        text-anchor="middle" letter-spacing="-0.04em">t</text>

  <!-- "t" laranja frente -->
  <text x="125" y="160"
        font-family="'Fredoka', 'Quicksand', 'Comic Sans MS', sans-serif"
        font-weight="700" font-size="130" fill="#F38A35"
        text-anchor="middle" letter-spacing="-0.04em">t</text>

  <!-- Coraçãozinho verde -->
  <path d="M 165 158 c -4 -3.6 -9 -1.6 -9 3 c 0 4 9 11 9 11 s 9 -7 9 -11 c 0 -4.6 -5 -6.6 -9 -3 z" fill="#3DB48F"/>
</svg>
